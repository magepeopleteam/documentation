# =============================================================================
# Deploy Documentation to cPanel via FTP
# =============================================================================
# Trigger:  GitHub Release published
# Action:   Builds Docusaurus site and uploads output to public_html/docs/
# =============================================================================

name: Deploy to cPanel

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to cPanel via FTP
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Check out the repository at the tag associated with the release
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      # ------------------------------------------------------------------
      # 2. Install dependencies and build Docusaurus
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      # ------------------------------------------------------------------
      # 3. Verify the build output exists
      # ------------------------------------------------------------------
      - name: Validate build output
        run: |
          echo "=== Validating build output ==="
          if [ ! -f build/index.html ]; then
            echo "::error::build/index.html not found"
            exit 1
          fi
          echo "  ✓ build/index.html found"
          echo "=== Validation passed ==="

      # ------------------------------------------------------------------
      # 4. Deploy via FTP using SamKirkland's FTP Deploy Action
      # ------------------------------------------------------------------
      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          server-dir: ${{ secrets.FTP_DIRECTORY }}
          dangerous-clean-slate: true
          exclude: |
            **/.DS_Store
            **/Thumbs.db
