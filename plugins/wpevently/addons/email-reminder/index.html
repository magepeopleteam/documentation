<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>

  <div id="topbar-root"></div>

  <section class="hero">
    <div class="eyebrow">Documentation Hub &middot; WordPress Booking Suite</div>
    <h1>Email Reminder &mdash; WpEvently Add‑On</h1>
    <p class="lede">Send automatic reminder emails before an event. This helps reduce no-shows and keeps attendees informed.</p>
  </section>

  <main id="main">

  <footer>
    BOOKING SUITE DOCS &middot; 7 PLUGINS &middot; 44 PLUGIN ADDONS &middot; BUILT WITH PLAIN HTML, CSS &amp; JS
  </footer>

<script>
(function(){
  "use strict";

  renderTopbar([
    { href: '../../../../index.html', label: 'All Plugins' },
    { href: '../../index.html', label: 'WpEvently' },
    { href: '#', label: 'Email Reminder' }
  ], '../../../../images/MG-web-logo.webp');

  var clockEl = document.getElementById('clock');
  function tick(){
    var d = new Date();
    var pad = function(n){ return n.toString().padStart(2,'0'); };
    clockEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
