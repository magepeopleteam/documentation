<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WpEvently — Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="16x16" href="../../favicon.ico">
<link rel="stylesheet" href="../../style.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../js/layout.js"></script>
</head>
<body>

  <div id="topbar-root"></div>

  <section class="hero">
    <div class="eyebrow">Documentation Hub &middot; WordPress Booking Suite</div>
    <h1>WpEvently &mdash; Event Manager Plugin for WordPress</h1>
    <p class="lede">Complete documentation for WpEvently events, ticket types, seating, and checkout addons.</p>
  </section>

  <main id="main">


  </main>

  <footer>
    BOOKING SUITE DOCS &middot; 7 PLUGINS &middot; 44 PLUGIN ADDONS &middot; BUILT WITH PLAIN HTML, CSS &amp; JS
  </footer>

<script>
(function(){
  "use strict";

  /* ---- render topbar via React ---- */
  renderTopbar([
    { href: '../../index.html', label: 'All Plugins' },
    { href: '#wpevently', label: 'WpEvently' }
  ], '../../images/MG-web-logo.webp');

  /* ---- live clock ---- */
  var clockEl = document.getElementById('clock');
  function tick(){
    var d = new Date();
    var pad = function(n){ return n.toString().padStart(2,'0'); };
    clockEl.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }
  tick();
  setInterval(tick, 1000);

  /* ---- addon accordion ---- */
  document.querySelectorAll('.addon-row').forEach(function(btn){
    btn.addEventListener('click', function(){
      var panel = btn.nextElementSibling;
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      if(expanded){
        panel.style.maxHeight = '0px';
      } else {
        panel.style.maxHeight = panel.scrollHeight + 'px';
      }
    });
  });

  /* ---- expand/collapse all per plugin ---- */
  document.querySelectorAll('.toggle-all').forEach(function(toggle){
    toggle.addEventListener('click', function(){
      var group = toggle.getAttribute('data-target');
      var rows = document.querySelectorAll('[data-group="' + group + '"] .addon-row');
      var anyCollapsed = Array.prototype.some.call(rows, function(r){
        return r.getAttribute('aria-expanded') !== 'true';
      });
      rows.forEach(function(row){
        var panel = row.nextElementSibling;
        row.setAttribute('aria-expanded', String(anyCollapsed));
        panel.style.maxHeight = anyCollapsed ? panel.scrollHeight + 'px' : '0px';
      });
      toggle.textContent = anyCollapsed ? 'Collapse all' : 'Expand all';
    });
  });

  /* ---- search filter across plugins + addons ---- */
  var searchInput = document.getElementById('searchInput');
  var noResults = document.getElementById('noResults');
  var plugins = document.querySelectorAll('.plugin');

  searchInput.addEventListener('input', function(){
    var q = searchInput.value.trim().toLowerCase();
    var anyVisible = false;

    plugins.forEach(function(plugin){
      var pluginName = (plugin.getAttribute('data-name') || '').toLowerCase();
      var addonItems = plugin.querySelectorAll('.addon');
      var pluginMatches = q === '' || pluginName.indexOf(q) !== -1;
      var anyAddonMatch = false;

      addonItems.forEach(function(item){
        var addonName = (item.getAttribute('data-name') || '').toLowerCase();
        var match = q === '' || pluginMatches || addonName.indexOf(q) !== -1;
        item.classList.toggle('hidden-by-search', !match);
        if(match) anyAddonMatch = true;
      });

      var showPlugin = q === '' || pluginMatches || anyAddonMatch;
      plugin.classList.toggle('hidden-by-search', !showPlugin);
      if(showPlugin) anyVisible = true;
    });

    noResults.style.display = anyVisible ? 'none' : 'block';
  });
})();
</script>
</body>
</html>
